services:

  # ---------------------------------------------------------------------------
  # nginx — 리버스 프록시 (유일한 외부 진입점)
  #   /api/     → backend:8080
  #   /         → frontend:80
  #   /actuator → 403 (외부 차단)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — nginx (React SPA 정적 파일, 외부 포트 없음)
  # ---------------------------------------------------------------------------
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/base-frontend:${IMAGE_TAG:-latest}
    expose:
      - "80"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend — Spring Boot API (외부 포트 없음)
  # ---------------------------------------------------------------------------
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/base-backend:${IMAGE_TAG:-latest}
    expose:
      - "8080"
    environment:
      # Database
      DB_URL: jdbc:mysql://mysql:3306/base?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
      DB_USERNAME: base
      DB_PASSWORD: ${DB_PASSWORD}
      # Redis (service name으로 접근)
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      # MinIO (service name으로 접근)
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-files}
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      # SMTP
      EMAIL_FROM: ${EMAIL_FROM}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
      # OAuth2
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID:-}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET:-}
      KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      NAVER_REDIRECT_URI: ${NAVER_REDIRECT_URI:-}
      TZ: Asia/Seoul
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health/liveness || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MySQL 8.0 (외부 포트 없음)
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.0
    expose:
      - "3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: base
      MYSQL_USER: base
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "base", "-p${DB_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7 (외부 포트 없음)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO — S3 호환 오브젝트 스토리지 (외부 포트 없음)
  #   콘솔 접근: ssh -L 9001:localhost:9001 user@서버IP
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    expose:
      - "9000"
      - "9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  minio-data:
