spring:
  application:
    name: base
  datasource:
    url: jdbc:h2:mem:base;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  flyway:
    enabled: false
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-minimum-256-bits-long}
  expiration-ms: 3600000
