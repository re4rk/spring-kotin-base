spring:
  application:
    name: base
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/base}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 3600000
