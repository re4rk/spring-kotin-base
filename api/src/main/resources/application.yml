spring:
  application:
    name: base

  # ---------------------------------------------------------------------------
  # 데이터소스 - MySQL 8.0
  #   환경변수로 오버라이드 가능: DB_URL / DB_USERNAME / DB_PASSWORD
  #   utf8mb4: 이모지·다국어 완전 지원 (서버 문자셋과 일치)
  # ---------------------------------------------------------------------------
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/base?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${DB_USERNAME:base}
    password: ${DB_PASSWORD:base}

  jpa:
    hibernate:
      # validate: Flyway 가 스키마를 관리하므로 JPA 는 검증만 수행
      ddl-auto: validate
    open-in-view: false

  # ---------------------------------------------------------------------------
  # Flyway - 스키마 마이그레이션
  #   마이그레이션 파일 위치: domain/src/main/resources/db/migration/
  #   V1__init.sql: 전체 테이블 초기 생성
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true

  # ---------------------------------------------------------------------------
  # Redis - RefreshToken / PasswordResetToken 저장소
  # ---------------------------------------------------------------------------
  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # ---------------------------------------------------------------------------
  # 이메일 (SMTP)
  #   로컬 개발: Mailpit (smtp 1025, 웹 UI 8025)
  #   운영 환경: 환경변수로 오버라이드 (MAIL_HOST / MAIL_PORT / MAIL_USERNAME / MAIL_PASSWORD)
  # ---------------------------------------------------------------------------
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

# ---------------------------------------------------------------------------
# JWT 설정
#   secret: 운영 환경에서는 반드시 환경변수(JWT_SECRET)로 주입
#   expiration-ms: 액세스 토큰 만료 (1시간)
#   리프레시 토큰은 Redis 에 TTL 7일로 저장 (RefreshToken.ttl)
# ---------------------------------------------------------------------------
jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-minimum-256-bits-long}
  expiration-ms: 3600000

email:
  from: ${EMAIL_FROM:noreply@base.local}

# ---------------------------------------------------------------------------
# MinIO (S3 호환 오브젝트 스토리지)
#   파일 업로드 흐름: FileController → MinioFileClient → MinIO
#   메타데이터(original_name, stored_name 등)는 file_metadata 테이블에 저장
# ---------------------------------------------------------------------------
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:files}

# ---------------------------------------------------------------------------
# Actuator - 헬스체크
#   /actuator/health: 전체 상태
#   readiness: db + redis + minioFileClient
#   liveness: livenessState
# ---------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
      show-details: always
      show-components: always
  health:
    minio:
      enabled: true
    smtp:
      enabled: true
    fcm:
      enabled: true
    group:
      readiness:
        include: readinessState, db, redis, minioFileClient, smtpEmailClient, fcmPushClient
      liveness:
        include: livenessState
