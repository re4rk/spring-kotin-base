<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}"
      th:with="activeMenu='products'">
<head>
    <title th:text="${product.name}">상품 상세</title>
</head>
<body>
<th:block layout:fragment="content">
    <div class="detail-header">
        <a th:href="@{/admin/products}" class="btn btn-secondary btn-sm">← 목록</a>
        <h1 class="page-title" th:text="${product.name}">상품명</h1>
        <span class="badge"
              th:classappend="'badge-' + ${product.status.name()}"
              th:text="${product.status.name()}"></span>

        <div class="detail-actions">
            <form th:if="${product.status.name() == 'PENDING'}"
                  th:action="@{/admin/products/{id}/approve(id=${product.id})}" method="post">
                <button class="btn btn-success btn-sm">승인</button>
            </form>
            <form th:if="${product.status.name() == 'PENDING'}"
                  th:action="@{/admin/products/{id}/reject(id=${product.id})}" method="post">
                <button class="btn btn-warning btn-sm">반려</button>
            </form>
            <form th:if="${product.status.name() == 'ON_SALE'}"
                  th:action="@{/admin/products/{id}/sold-out(id=${product.id})}" method="post">
                <button class="btn btn-danger btn-sm">품절</button>
            </form>
            <form th:if="${product.status.name() == 'SOLD_OUT'}"
                  th:action="@{/admin/products/{id}/resume-sale(id=${product.id})}" method="post">
                <button class="btn btn-success btn-sm">재판매</button>
            </form>
            <form th:unless="${product.status.name() == 'DISCONTINUED'}"
                  th:action="@{/admin/products/{id}/discontinue(id=${product.id})}" method="post">
                <button class="btn btn-secondary btn-sm">판매중지</button>
            </form>
        </div>
    </div>

    <div class="detail-grid">
        <div class="panel panel-span">
            <div class="panel-title">기본 정보</div>
            <dl class="detail-list">
                <dt>ID</dt>
                <dd th:text="${product.id}"></dd>

                <dt>상품명</dt>
                <dd th:text="${product.name}"></dd>

                <dt>가격</dt>
                <dd th:text="${#numbers.formatInteger(product.price, 0, 'COMMA') + '원'}"></dd>

                <dt>총 재고</dt>
                <dd th:text="${product.stock + '개'}"></dd>

                <dt>카테고리</dt>
                <dd th:text="${product.category ?: '-'}"></dd>

                <dt>설명</dt>
                <dd th:text="${product.description ?: '-'}"></dd>

                <dt>썸네일</dt>
                <dd>
                    <img th:if="${product.thumbnailUrl}" th:src="${product.thumbnailUrl}"
                         alt="썸네일" style="max-height:80px; border-radius:8px;">
                    <span th:unless="${product.thumbnailUrl}" class="muted">-</span>
                </dd>
            </dl>
        </div>

        <div class="panel" th:if="${!product.optionGroups.empty}">
            <div class="panel-title">옵션 그룹</div>
            <div th:each="group : ${product.optionGroups}" class="option-block">
                <div class="option-block-title" th:text="${group.name}"></div>
                <div class="chip-row">
                    <span th:each="opt : ${group.options}"
                          th:text="${opt.name}"
                          class="chip"></span>
                </div>
            </div>
        </div>

        <div class="panel"
             th:classappend="${product.optionGroups.empty} ? ' panel-span'"
             th:if="${!product.skus.empty}">
            <div class="panel-title">SKU / 재고</div>
            <div class="table-wrap">
                <table class="toss-table">
                    <thead>
                    <tr>
                        <th>옵션 조합</th>
                        <th class="text-end">추가금액</th>
                        <th class="text-end">재고</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="sku : ${product.skus}">
                        <td>
                            <span th:if="${sku.options.empty}" class="muted">기본</span>
                            <span th:each="opt, stat : ${sku.options}">
                                <span th:text="${opt.name}"></span><span th:unless="${stat.last}"> / </span>
                            </span>
                        </td>
                        <td class="text-end"
                            th:text="${sku.extraPrice > 0 ? ('+' + #numbers.formatInteger(sku.extraPrice, 0, 'COMMA') + '원') : '-'}"></td>
                        <td class="text-end"
                            th:classappend="${sku.stock == 0} ? ' text-danger'"
                            th:text="${sku.stock}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</th:block>
</body>
</html>
