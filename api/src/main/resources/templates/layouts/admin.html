<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE - Admin">Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; width: 220px; flex-shrink: 0; }
        .sidebar a { color: #adb5bd; text-decoration: none; display: block; padding: 0.5rem 1rem; }
        .sidebar a:hover, .sidebar a.active { color: #fff; background-color: #343a40; }
    </style>
    <th:block layout:fragment="head-extra"></th:block>
</head>
<body>
<div class="d-flex">
    <div class="sidebar p-3">
        <div class="text-white fw-bold mb-4 px-2">Admin Panel</div>
        <th:block th:insert="~{fragments/sidebar :: sidebar(${activeMenu})}"></th:block>
        <div class="mt-4">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" class="btn btn-outline-secondary btn-sm w-100">로그아웃</button>
            </form>
        </div>
    </div>

    <div class="flex-grow-1 p-4">
        <layout:fragment name="content">
            <!-- 각 페이지 내용이 여기에 들어옵니다 -->
        </layout:fragment>
    </div>
</div>
</body>
</html>
