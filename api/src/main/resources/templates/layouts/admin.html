<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title layout:title-pattern="$CONTENT_TITLE - Admin">Admin</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <th:block layout:fragment="head-extra"></th:block>
</head>
<body>
<div class="admin-shell">
    <aside class="admin-sidebar">
        <div class="admin-brand">Ark <span>Admin</span></div>
        <nav class="admin-nav">
            <th:block th:insert="~{fragments/sidebar :: sidebar(${activeMenu})}"></th:block>
        </nav>
        <div class="admin-sidebar-footer">
            <form th:action="@{/admin/logout}" method="post">
                <button type="submit" class="btn btn-ghost btn-sm btn-block">로그아웃</button>
            </form>
        </div>
    </aside>

    <main class="admin-main">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
        <th:block layout:fragment="content"></th:block>
    </main>
</div>
</body>
</html>
