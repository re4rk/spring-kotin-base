<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="statusBadge(status)">
    <span th:switch="${status.name()}">
        <span th:case="'SUCCESS'" class="badge bg-success">SUCCESS</span>
        <span th:case="'DELIVERED'" class="badge bg-success">DELIVERED</span>
        <span th:case="'PENDING'" class="badge bg-secondary">PENDING</span>
        <span th:case="'FAILED'" class="badge bg-danger">FAILED</span>
        <span th:case="'BOUNCED'" class="badge bg-warning text-dark">BOUNCED</span>
        <span th:case="'MISSED'" class="badge bg-warning text-dark">MISSED</span>
        <span th:case="*" class="badge bg-light text-dark" th:text="${status.name()}"></span>
    </span>
</th:block>

<nav th:fragment="pagination(basePath, page)">
    <nav th:if="${page.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                <a class="page-link" th:href="@{${basePath}(page=${page.number - 1})}">이전</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                th:classappend="${i == page.number} ? 'active'">
                <a class="page-link" th:href="@{${basePath}(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                <a class="page-link" th:href="@{${basePath}(page=${page.number + 1})}">다음</a>
            </li>
        </ul>
    </nav>
</nav>
</body>
</html>
