<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<body>
<th:block th:fragment="statusBadge(status)">
    <span class="badge" th:classappend="'badge-' + ${status.name()}" th:text="${status.name()}"></span>
</th:block>

<div th:fragment="stats(stats)" class="stat-grid">
    <div class="stat-card">
        <div class="stat-card-label">전체</div>
        <div class="stat-card-value" th:text="${stats.total}">0</div>
    </div>
    <div class="stat-card" th:each="item : ${stats.items}">
        <div class="stat-card-label" th:text="${item.status}">STATUS</div>
        <div class="stat-card-value-row">
            <div class="stat-card-value" th:text="${item.count}">0</div>
            <span class="badge" th:classappend="'badge-' + ${item.status}" th:text="${item.status}">STATUS</span>
        </div>
    </div>
</div>

<nav th:fragment="pagination(basePath, page)" th:if="${page.totalPages > 1}" class="mt-3">
    <ul class="pagination">
        <li class="page-item" th:classappend="${page.first} ? 'disabled'">
            <a class="page-link" th:href="@{${basePath}(page=${page.number - 1})}">이전</a>
        </li>
        <li class="page-item"
            th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
            th:classappend="${i == page.number} ? 'active'">
            <a class="page-link" th:href="@{${basePath}(page=${i})}" th:text="${i + 1}"></a>
        </li>
        <li class="page-item" th:classappend="${page.last} ? 'disabled'">
            <a class="page-link" th:href="@{${basePath}(page=${page.number + 1})}">다음</a>
        </li>
    </ul>
</nav>
</body>
</html>
