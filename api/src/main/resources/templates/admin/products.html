<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}"
      th:with="activeMenu='products'">
<head>
    <title>상품 관리</title>
</head>
<body>
<th:block layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="mb-0">상품 관리</h5>
        <small class="text-muted">총 <span th:text="${products.totalElements}"></span>개</small>
    </div>

    <!-- 필터 폼 -->
    <form th:action="@{/admin/products}" method="get" class="card shadow-sm p-3 mb-3">
        <div class="row g-2 align-items-end">
            <div class="col-auto">
                <label class="form-label small mb-1">상태</label>
                <select name="status" class="form-select form-select-sm">
                    <option value="">전체</option>
                    <option th:each="s : ${statuses}"
                            th:value="${s.name()}"
                            th:text="${s.name()}"
                            th:selected="${s == filter.status}"></option>
                </select>
            </div>
            <div class="col">
                <label class="form-label small mb-1">상품명</label>
                <input type="text" name="name" class="form-control form-control-sm"
                       th:value="${filter.name}" placeholder="검색어">
            </div>
            <div class="col-auto">
                <label class="form-label small mb-1">카테고리</label>
                <input type="text" name="category" class="form-control form-control-sm"
                       th:value="${filter.category}" placeholder="카테고리">
            </div>
            <div class="col-auto">
                <label class="form-label small mb-1">최소 가격</label>
                <input type="number" name="minPrice" class="form-control form-control-sm"
                       th:value="${filter.minPrice}" placeholder="0">
            </div>
            <div class="col-auto">
                <label class="form-label small mb-1">최대 가격</label>
                <input type="number" name="maxPrice" class="form-control form-control-sm"
                       th:value="${filter.maxPrice}" placeholder="999999">
            </div>
            <div class="col-auto">
                <button type="submit" class="btn btn-primary btn-sm">검색</button>
                <a th:href="@{/admin/products}" class="btn btn-outline-secondary btn-sm ms-1">초기화</a>
            </div>
        </div>
    </form>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>상품명</th>
                    <th>가격</th>
                    <th>카테고리</th>
                    <th>상태</th>
                    <th>등록일</th>
                    <th>액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="product : ${products.content}">
                    <td class="text-muted" th:text="${product.id}"></td>
                    <td th:text="${product.name}"></td>
                    <td th:text="${#numbers.formatInteger(product.price, 0, 'COMMA') + '원'}"></td>
                    <td th:text="${product.category ?: '-'}"></td>
                    <td>
                        <span th:switch="${product.status.name()}">
                            <span th:case="'DRAFT'" class="badge bg-secondary">DRAFT</span>
                            <span th:case="'PENDING'" class="badge bg-warning text-dark">PENDING</span>
                            <span th:case="'ON_SALE'" class="badge bg-success">ON_SALE</span>
                            <span th:case="'SOLD_OUT'" class="badge bg-danger">SOLD_OUT</span>
                            <span th:case="'DISCONTINUED'" class="badge bg-dark">DISCONTINUED</span>
                        </span>
                    </td>
                    <td class="text-muted" th:text="${#temporals.format(product.createdAt, 'yyyy-MM-dd')}"></td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <form th:if="${product.status.name() == 'PENDING'}"
                                  th:action="@{/admin/products/{id}/approve(id=${product.id})}" method="post">
                                <button class="btn btn-success btn-sm">승인</button>
                            </form>
                            <form th:if="${product.status.name() == 'PENDING'}"
                                  th:action="@{/admin/products/{id}/reject(id=${product.id})}" method="post">
                                <button class="btn btn-warning btn-sm">반려</button>
                            </form>
                            <form th:if="${product.status.name() == 'ON_SALE'}"
                                  th:action="@{/admin/products/{id}/sold-out(id=${product.id})}" method="post">
                                <button class="btn btn-danger btn-sm">품절</button>
                            </form>
                            <form th:if="${product.status.name() == 'SOLD_OUT'}"
                                  th:action="@{/admin/products/{id}/resume-sale(id=${product.id})}" method="post">
                                <button class="btn btn-success btn-sm">재판매</button>
                            </form>
                            <form th:unless="${product.status.name() == 'DISCONTINUED'}"
                                  th:action="@{/admin/products/{id}/discontinue(id=${product.id})}" method="post">
                                <button class="btn btn-outline-dark btn-sm">판매중지</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${products.content.empty}">
                    <td colspan="7" class="text-center text-muted py-4">상품이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${products.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${products.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/products(page=${products.number - 1}, status=${filter.status?.name()})}">이전</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                th:classappend="${i == products.number} ? 'active'">
                <a class="page-link"
                   th:href="@{/admin/products(page=${i}, status=${filter.status?.name()})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${products.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/products(page=${products.number + 1}, status=${filter.status?.name()})}">다음</a>
            </li>
        </ul>
    </nav>
</th:block>
</body>
</html>
