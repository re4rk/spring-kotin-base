<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}"
      th:with="activeMenu='orders'">
<head>
    <title>주문 관리</title>
</head>
<body>
<th:block layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0">주문 관리</h5>
        <small class="text-muted">총 <span th:text="${orders.totalElements}"></span>건</small>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>상품명</th>
                    <th>수량</th>
                    <th>유저 ID</th>
                    <th>상태</th>
                    <th>주문일</th>
                    <th>액션</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="order : ${orders.content}">
                    <td class="text-muted" th:text="${order.id}"></td>
                    <td th:text="${order.productName}"></td>
                    <td th:text="${order.quantity}"></td>
                    <td class="text-muted" th:text="${order.userId}"></td>
                    <td>
                        <span th:switch="${order.status.name()}">
                            <span th:case="'PLACED'" class="badge bg-primary">PLACED</span>
                            <span th:case="'CONFIRMED'" class="badge bg-info text-dark">CONFIRMED</span>
                            <span th:case="'SHIPPING'" class="badge bg-warning text-dark">SHIPPING</span>
                            <span th:case="'DELIVERED'" class="badge bg-success">DELIVERED</span>
                            <span th:case="'CANCELLED'" class="badge bg-secondary">CANCELLED</span>
                        </span>
                    </td>
                    <td class="text-muted" th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <div class="d-flex gap-1 flex-wrap">
                            <form th:if="${order.status.name() == 'PLACED'}"
                                  th:action="@{/admin/orders/{id}/confirm(id=${order.id})}" method="post">
                                <button class="btn btn-primary btn-sm">확인</button>
                            </form>
                            <form th:if="${order.status.name() == 'CONFIRMED'}"
                                  th:action="@{/admin/orders/{id}/ship(id=${order.id})}" method="post">
                                <button class="btn btn-info btn-sm">배송</button>
                            </form>
                            <form th:if="${order.status.name() == 'SHIPPING'}"
                                  th:action="@{/admin/orders/{id}/deliver(id=${order.id})}" method="post">
                                <button class="btn btn-success btn-sm">완료</button>
                            </form>
                            <form th:if="${order.status.isCancellable}"
                                  th:action="@{/admin/orders/{id}/cancel(id=${order.id})}" method="post">
                                <button class="btn btn-outline-danger btn-sm">취소</button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${orders.content.empty}">
                    <td colspan="7" class="text-center text-muted py-4">주문이 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${orders.totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${orders.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/orders(page=${orders.number - 1})}">이전</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, orders.totalPages - 1)}"
                th:classappend="${i == orders.number} ? 'active'">
                <a class="page-link" th:href="@{/admin/orders(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${orders.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/orders(page=${orders.number + 1})}">다음</a>
            </li>
        </ul>
    </nav>
</th:block>
</body>
</html>
