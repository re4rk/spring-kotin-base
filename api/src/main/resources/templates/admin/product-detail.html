<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}"
      th:with="activeMenu='products'">
<head>
    <title th:text="${product.name}">상품 상세</title>
</head>
<body>
<th:block layout:fragment="content">

    <!-- 헤더 -->
    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin/products}" class="btn btn-outline-secondary btn-sm">← 목록</a>
        <h5 class="mb-0" th:text="${product.name}"></h5>
        <span th:switch="${product.status.name()}">
            <span th:case="'DRAFT'" class="badge bg-secondary">DRAFT</span>
            <span th:case="'PENDING'" class="badge bg-warning text-dark">PENDING</span>
            <span th:case="'ON_SALE'" class="badge bg-success">ON_SALE</span>
            <span th:case="'SOLD_OUT'" class="badge bg-danger">SOLD_OUT</span>
            <span th:case="'DISCONTINUED'" class="badge bg-dark">DISCONTINUED</span>
        </span>

        <!-- 상태 액션 버튼 -->
        <div class="ms-auto d-flex gap-2">
            <form th:if="${product.status.name() == 'PENDING'}"
                  th:action="@{/admin/products/{id}/approve(id=${product.id})}" method="post">
                <button class="btn btn-success btn-sm">승인</button>
            </form>
            <form th:if="${product.status.name() == 'PENDING'}"
                  th:action="@{/admin/products/{id}/reject(id=${product.id})}" method="post">
                <button class="btn btn-warning btn-sm">반려</button>
            </form>
            <form th:if="${product.status.name() == 'ON_SALE'}"
                  th:action="@{/admin/products/{id}/sold-out(id=${product.id})}" method="post">
                <button class="btn btn-danger btn-sm">품절</button>
            </form>
            <form th:if="${product.status.name() == 'SOLD_OUT'}"
                  th:action="@{/admin/products/{id}/resume-sale(id=${product.id})}" method="post">
                <button class="btn btn-success btn-sm">재판매</button>
            </form>
            <form th:unless="${product.status.name() == 'DISCONTINUED'}"
                  th:action="@{/admin/products/{id}/discontinue(id=${product.id})}" method="post">
                <button class="btn btn-outline-dark btn-sm">판매중지</button>
            </form>
        </div>
    </div>

    <div class="row g-4">

        <!-- 기본 정보 -->
        <div class="col-12">
            <div class="card shadow-sm">
                <div class="card-header fw-semibold">기본 정보</div>
                <div class="card-body">
                    <dl class="row mb-0">
                        <dt class="col-sm-2 text-muted">ID</dt>
                        <dd class="col-sm-10" th:text="${product.id}"></dd>

                        <dt class="col-sm-2 text-muted">상품명</dt>
                        <dd class="col-sm-10" th:text="${product.name}"></dd>

                        <dt class="col-sm-2 text-muted">가격</dt>
                        <dd class="col-sm-10" th:text="${#numbers.formatInteger(product.price, 0, 'COMMA') + '원'}"></dd>

                        <dt class="col-sm-2 text-muted">총 재고</dt>
                        <dd class="col-sm-10" th:text="${product.stock + '개'}"></dd>

                        <dt class="col-sm-2 text-muted">카테고리</dt>
                        <dd class="col-sm-10" th:text="${product.category ?: '-'}"></dd>

                        <dt class="col-sm-2 text-muted">설명</dt>
                        <dd class="col-sm-10" th:text="${product.description ?: '-'}"></dd>

                        <dt class="col-sm-2 text-muted">썸네일</dt>
                        <dd class="col-sm-10">
                            <img th:if="${product.thumbnailUrl}" th:src="${product.thumbnailUrl}"
                                 alt="썸네일" style="max-height:80px; border-radius:4px;">
                            <span th:unless="${product.thumbnailUrl}" class="text-muted">-</span>
                        </dd>
                    </dl>
                </div>
            </div>
        </div>

        <!-- 옵션 그룹 -->
        <div class="col-md-6" th:if="${!product.optionGroups.empty}">
            <div class="card shadow-sm h-100">
                <div class="card-header fw-semibold">옵션 그룹</div>
                <div class="card-body p-0">
                    <div th:each="group : ${product.optionGroups}" class="p-3 border-bottom">
                        <div class="fw-semibold small mb-2" th:text="${group.name}"></div>
                        <div class="d-flex flex-wrap gap-1">
                            <span th:each="opt : ${group.options}"
                                  th:text="${opt.name}"
                                  class="badge bg-light text-dark border"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- SKU 목록 -->
        <div th:class="${product.optionGroups.empty} ? 'col-12' : 'col-md-6'"
             th:if="${!product.skus.empty}">
            <div class="card shadow-sm h-100">
                <div class="card-header fw-semibold">SKU / 재고</div>
                <div class="table-responsive">
                    <table class="table table-sm mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>옵션 조합</th>
                            <th class="text-end">추가금액</th>
                            <th class="text-end">재고</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="sku : ${product.skus}">
                            <td>
                                <span th:if="${sku.options.empty}" class="text-muted">기본</span>
                                <span th:each="opt, stat : ${sku.options}">
                                    <span th:text="${opt.name}"></span><span th:unless="${stat.last}"> / </span>
                                </span>
                            </td>
                            <td class="text-end"
                                th:text="${sku.extraPrice > 0 ? ('+' + #numbers.formatInteger(sku.extraPrice, 0, 'COMMA') + '원') : '-'}"></td>
                            <td class="text-end fw-semibold"
                                th:classappend="${sku.stock == 0} ? 'text-danger'"
                                th:text="${sku.stock}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</th:block>
</body>
</html>
