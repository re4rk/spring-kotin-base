<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}"
      th:with="activeMenu='logs-email'">
<head>
    <title>Email 로그</title>
</head>
<body>
<th:block layout:fragment="content">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h5 class="mb-0">Email 로그</h5>
        <small class="text-muted">총 <span th:text="${logs.totalElements}"></span>건</small>
    </div>

    <div class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>수신</th>
                    <th>발신</th>
                    <th>제목</th>
                    <th>상태</th>
                    <th>발송일</th>
                    <th>생성일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="log : ${logs.content}">
                    <td class="text-muted" th:text="${log.id}"></td>
                    <td th:text="${log.receiverEmail}"></td>
                    <td class="text-muted" th:text="${log.senderEmail}"></td>
                    <td>
                        <div th:text="${log.subject}"></div>
                        <small th:if="${log.errorMessage}" class="text-danger" th:text="${log.errorMessage}"></small>
                    </td>
                    <td><th:block th:replace="~{fragments/log :: statusBadge(${log.status})}"></th:block></td>
                    <td class="text-muted"
                        th:text="${log.sentAt != null ? #temporals.format(log.sentAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                    <td class="text-muted" th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
                <tr th:if="${logs.content.empty}">
                    <td colspan="7" class="text-center text-muted py-4">로그가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <th:block th:replace="~{fragments/log :: pagination('/admin/logs/email', ${logs})}"></th:block>
</th:block>
</body>
</html>
