<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}"
      th:with="activeMenu='logs-sms'">
<head>
    <title>SMS 로그</title>
</head>
<body>
<th:block layout:fragment="content">
    <div class="page-header">
        <h1 class="page-title">SMS 로그</h1>
        <div class="page-meta">총 <span th:text="${logs.totalElements}"></span>건</div>
    </div>

    <th:block th:replace="~{fragments/log :: stats(${stats})}"></th:block>

    <div class="panel">
        <div class="table-wrap">
            <table class="toss-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>수신</th>
                    <th>내용</th>
                    <th>상태</th>
                    <th>발송일</th>
                    <th>생성일</th>
                </tr>
                </thead>
                <tbody>

                <tr th:each="log : ${logs.content}">
                    <td class="muted" th:text="${log.id}"></td>
                    <td th:text="${log.recipient}"></td>
                    <td><div class="truncate" th:text="${log.message}"></div>
                        <small th:if="${log.errorMessage}" style="color:var(--red-500)" th:text="${log.errorMessage}"></small></td>
                    <td><th:block th:replace="~{fragments/log :: statusBadge(${log.status})}"></th:block></td>
                    <td class="muted" th:text="${log.sentAt != null ? #temporals.format(log.sentAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
                    <td class="muted" th:text="${#temporals.format(log.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
                <tr th:if="${logs.content.empty}">
                    <td colspan="6" class="empty">로그가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <th:block th:replace="~{fragments/log :: pagination('/admin/logs/sms', ${logs})}"></th:block>
</th:block>
</body>
</html>
