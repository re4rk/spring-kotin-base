<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}"
      th:with="activeMenu='users'">
<head>
    <title>유저 목록</title>
</head>
<body>
<th:block layout:fragment="content">
    <div class="page-header">
        <h1 class="page-title">유저 목록</h1>
        <div class="page-meta">총 <span th:text="${users.totalElements}"></span>명</div>
    </div>

    <div class="panel">
        <div class="table-wrap">
            <table class="toss-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>이메일</th>
                    <th>이름</th>
                    <th>역할</th>
                    <th>가입일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="user : ${users.content}">
                    <td class="muted" th:text="${user.id}"></td>
                    <td th:text="${user.email}"></td>
                    <td th:text="${user.name}"></td>
                    <td>
                        <span class="badge"
                              th:classappend="'badge-' + ${user.role.name()}"
                              th:text="${user.role.name()}"></span>
                    </td>
                    <td class="muted" th:text="${#temporals.format(user.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
                </tr>
                <tr th:if="${users.content.empty}">
                    <td colspan="5" class="empty">유저가 없습니다.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <nav th:if="${users.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${users.first} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${users.number - 1})}">이전</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, users.totalPages - 1)}"
                th:classappend="${i == users.number} ? 'active'">
                <a class="page-link" th:href="@{/admin/users(page=${i})}" th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${users.last} ? 'disabled'">
                <a class="page-link" th:href="@{/admin/users(page=${users.number + 1})}">다음</a>
            </li>
        </ul>
    </nav>
</th:block>
</body>
</html>
