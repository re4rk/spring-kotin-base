<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <link rel="stylesheet" as="style" crossorigin
          href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="login-page">
<div class="login-card">
    <h1 class="login-title">Ark Admin</h1>
    <p class="login-subtitle">관리자 계정으로 로그인하세요</p>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <form th:action="@{/admin/login}" method="post">
        <div class="mb-3">
            <label for="username" class="form-label">이메일</label>
            <input type="email" id="username" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">비밀번호</label>
            <input type="password" id="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">로그인</button>
    </form>

    <div class="login-divider"><span>또는</span></div>
    <a th:href="@{/admin/oauth/kakao}" class="btn btn-kakao btn-block">카카오로 로그인</a>
</div>
</body>
</html>
