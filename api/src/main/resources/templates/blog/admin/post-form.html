<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/admin}"
      th:with="activeMenu='posts'">
<head>
    <title th:text="${mode == 'create'} ? '새 글' : '포스트 편집'">포스트</title>
</head>
<body>
<th:block layout:fragment="content">
    <div class="detail-header">
        <a th:href="@{/admin/posts}" class="btn btn-secondary btn-sm">← 목록</a>
        <h1 class="page-title" th:text="${mode == 'create'} ? '새 글' : '포스트 편집'">포스트</h1>
        <span th:if="${post != null}" class="badge"
              th:classappend="'badge-' + ${post.status.name()}"
              th:text="${post.status.name()}"></span>

        <div class="detail-actions" th:if="${post != null}">
            <form th:if="${post.status.name() == 'DRAFT'}"
                  th:action="@{/admin/posts/{id}/publish(id=${post.id})}" method="post">
                <button class="btn btn-success btn-sm">발행</button>
            </form>
            <form th:if="${post.status.name() == 'PUBLISHED'}"
                  th:action="@{/admin/posts/{id}/unpublish(id=${post.id})}" method="post">
                <button class="btn btn-warning btn-sm">초안</button>
            </form>
            <form th:unless="${post.status.name() == 'ARCHIVED'}"
                  th:action="@{/admin/posts/{id}/archive(id=${post.id})}" method="post">
                <button class="btn btn-secondary btn-sm">보관</button>
            </form>
            <form th:action="@{/admin/posts/{id}/delete(id=${post.id})}" method="post"
                  onsubmit="return confirm('삭제할까요?');">
                <button class="btn btn-danger btn-sm">삭제</button>
            </form>
        </div>
    </div>

    <div class="panel" style="max-width:800px">
        <form th:if="${mode == 'create'}" th:action="@{/admin/posts}" method="post" class="panel-form">
            <div class="mb-3">
                <label for="title" class="form-label">제목</label>
                <input type="text" id="title" name="title" class="form-control" maxlength="200" required>
            </div>
            <div class="mb-3">
                <label for="content" class="form-label">본문</label>
                <textarea id="content" name="content" class="form-control" rows="16" required
                          style="height:auto; padding:12px; line-height:1.6"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">저장</button>
        </form>

        <form th:if="${mode == 'edit'}" th:action="@{/admin/posts/{id}(id=${post.id})}" method="post" class="panel-form">
            <div class="mb-3">
                <label for="title" class="form-label">제목</label>
                <input type="text" id="title" name="title" class="form-control" maxlength="200"
                       th:value="${post.title}" required>
            </div>
            <div class="mb-3">
                <label for="content" class="form-label">본문</label>
                <textarea id="content" name="content" class="form-control" rows="16" required
                          style="height:auto; padding:12px; line-height:1.6"
                          th:text="${post.content}"></textarea>
            </div>
            <div class="muted" style="margin-bottom:12px; font-size:13px">
                작성자 ID <span th:text="${post.authorId}"></span>
                · 작성 <span th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd HH:mm')}"></span>
                <span th:if="${post.publishedAt != null}">
                    · 발행 <span th:text="${#temporals.format(post.publishedAt, 'yyyy-MM-dd HH:mm')}"></span>
                </span>
            </div>
            <button type="submit" class="btn btn-primary">수정 저장</button>
        </form>
    </div>
</th:block>
</body>
</html>
