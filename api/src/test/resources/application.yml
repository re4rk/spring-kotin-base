spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

jwt:
  secret: test-secret-key-minimum-256-bits-long-for-hmac
  expiration-ms: 3600000

management:
  endpoint:
    health:
      show-details: always
      show-components: always
  health:
    minio:
      enabled: false
    group:
      readiness:
        include: readinessState, db, redis
