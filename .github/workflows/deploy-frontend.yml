name: Deploy Full Stack

on:
  push:
    branches:
      - main
      - dev
    paths:
      - "frontend/**"
      - "api/**"
      - "domain/**"
      - "k8s/**"
      - ".github/workflows/deploy-frontend.yml"

env:
  REGISTRY: ghcr.io
  FRONTEND_IMAGE: ${{ github.repository_owner }}/base-frontend
  BACKEND_IMAGE: ${{ github.repository_owner }}/base-backend

jobs:
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:cache,mode=max

  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:cache,mode=max

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply namespace & config
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml

      - name: Apply secrets
        run: |
          kubectl create secret generic app-secret \
            --namespace=base \
            --from-literal=MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD }}" \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}" \
            --from-literal=MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}" \
            --from-literal=EMAIL_FROM="${{ secrets.EMAIL_FROM }}" \
            --from-literal=MAIL_HOST="${{ secrets.MAIL_HOST }}" \
            --from-literal=MAIL_USERNAME="${{ secrets.MAIL_USERNAME }}" \
            --from-literal=MAIL_PASSWORD="${{ secrets.MAIL_PASSWORD }}" \
            --from-literal=GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}" \
            --from-literal=GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}" \
            --from-literal=GOOGLE_REDIRECT_URI="${{ secrets.GOOGLE_REDIRECT_URI }}" \
            --from-literal=KAKAO_CLIENT_ID="${{ secrets.KAKAO_CLIENT_ID }}" \
            --from-literal=KAKAO_CLIENT_SECRET="${{ secrets.KAKAO_CLIENT_SECRET }}" \
            --from-literal=KAKAO_REDIRECT_URI="${{ secrets.KAKAO_REDIRECT_URI }}" \
            --from-literal=NAVER_CLIENT_ID="${{ secrets.NAVER_CLIENT_ID }}" \
            --from-literal=NAVER_CLIENT_SECRET="${{ secrets.NAVER_CLIENT_SECRET }}" \
            --from-literal=NAVER_REDIRECT_URI="${{ secrets.NAVER_REDIRECT_URI }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy infrastructure (MySQL, Redis, MinIO)
        run: |
          kubectl apply -f k8s/mysql/
          kubectl apply -f k8s/redis/
          kubectl apply -f k8s/minio/

      - name: Deploy applications
        run: |
          IMAGE_TAG=${{ github.sha }}

          kubectl set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${IMAGE_TAG:0:7} \
            --namespace=base 2>/dev/null || kubectl apply -f k8s/backend/

          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${IMAGE_TAG:0:7} \
            --namespace=base 2>/dev/null || kubectl apply -f k8s/frontend/

      - name: Apply ingress & cert-manager
        run: |
          kubectl apply -f k8s/cert-manager/
          kubectl apply -f k8s/ingress.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend --namespace=base --timeout=120s
          kubectl rollout status deployment/frontend --namespace=base --timeout=60s
