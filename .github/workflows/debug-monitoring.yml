name: Debug Monitoring

on:
  workflow_dispatch:

jobs:
  debug:
    name: Debug Tempo
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Tempo overrides.yaml content
        run: |
          echo "===== TEMPO OVERRIDES.YAML ====="
          kubectl exec -n monitoring statefulset/tempo -- cat /conf/overrides.yaml 2>/dev/null || echo "(not found)"
          echo ""
          echo "===== ALL TEMPO CONFIGMAPS ====="
          kubectl get configmap -n monitoring | grep -i tempo

      - name: Tempo ingestion check (push/receive logs, last 100 lines)
        run: |
          echo "===== TEMPO FULL LOGS (last 100 lines) ====="
          kubectl logs statefulset/tempo -n monitoring --tail=100

      - name: Test Tempo OTLP endpoint from cluster
        run: |
          echo "===== TEMPO OTLP HTTP CONNECTIVITY ====="
          kubectl run tempo-test --rm -i --restart=Never --image=curlimages/curl:latest -n base \
            -- curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://tempo.monitoring.svc.cluster.local:4318/v1/traces \
            -H "Content-Type: application/json" -d '{}' 2>/dev/null || echo "connectivity test failed"

      - name: Test Faro/Alloy endpoint from cluster
        run: |
          echo "===== ALLOY FARO CONNECTIVITY ====="
          kubectl run alloy-test --rm -i --restart=Never --image=curlimages/curl:latest -n base \
            -- curl -s -o /dev/null -w "%{http_code}" \
            -X POST http://alloy.monitoring.svc.cluster.local:12347/collect \
            -H "Content-Type: application/json" -d '{}' 2>/dev/null || echo "connectivity test failed"

      - name: Backend env (OTel config)
        run: |
          echo "===== BACKEND OTEL ENV ====="
          kubectl exec -n base deployment/backend -- env | grep -iE "otel|management|tracing" 2>/dev/null || echo "(exec failed)"
