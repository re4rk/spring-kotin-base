name: Debug Monitoring

on:
  workflow_dispatch:

jobs:
  debug:
    name: Debug Tempo
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Tempo configmap
        run: |
          echo "===== TEMPO CONFIGMAP ====="
          kubectl get configmap tempo -n monitoring -o jsonpath='{.data.tempo\.yaml}' 2>/dev/null \
            || kubectl get configmap -n monitoring -l app.kubernetes.io/name=tempo -o yaml | head -200

      - name: Tempo pod logs
        run: |
          echo "===== TEMPO POD LOGS (last 50 lines) ====="
          kubectl logs statefulset/tempo -n monitoring --tail=50 2>/dev/null \
            || kubectl logs -n monitoring -l app.kubernetes.io/name=tempo --tail=50

      - name: Tempo pod status
        run: |
          echo "===== TEMPO POD STATUS ====="
          kubectl get pods -n monitoring -l app.kubernetes.io/name=tempo -o wide
          kubectl describe pod -n monitoring -l app.kubernetes.io/name=tempo | tail -40

      - name: Prometheus remote write receiver
        run: |
          echo "===== PROMETHEUS FLAGS ====="
          kubectl get prometheus -n monitoring -o jsonpath='{.items[0].spec.enableRemoteWriteReceiver}' 2>/dev/null || true
          kubectl get pods -n monitoring -l app.kubernetes.io/name=prometheus --no-headers
