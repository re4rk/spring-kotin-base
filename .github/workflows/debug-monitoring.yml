name: Debug Monitoring

on:
  workflow_dispatch:

jobs:
  debug:
    name: Debug Tempo
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Tempo service ports
        run: |
          echo "===== TEMPO SERVICE ====="
          kubectl get svc tempo -n monitoring -o yaml | grep -A30 "ports:"

      - name: Alloy full logs (last 60 lines, no filter)
        run: |
          echo "===== ALLOY FULL LOGS ====="
          kubectl logs -n monitoring -l app.kubernetes.io/name=alloy --tail=60

      - name: Alloy -> Tempo gRPC connectivity
        run: |
          echo "===== ALLOY -> TEMPO gRPC ====="
          kubectl exec -n monitoring deployment/alloy -- \
            wget -q -O- --timeout=3 http://tempo.monitoring.svc.cluster.local:3200/status 2>&1 || echo "wget failed"
          kubectl exec -n monitoring deployment/alloy -- \
            nc -zv tempo.monitoring.svc.cluster.local 4317 2>&1 || echo "nc 4317 failed"

      - name: Faro ingress status
        run: |
          echo "===== FARO INGRESS ====="
          kubectl get ingress faro-ingress -n base -o yaml | grep -A20 "rules:\|status:\|backend:"
          echo "---"
          kubectl get svc alloy-faro -n base -o yaml | grep -A10 "spec:"

      - name: Backend span resource attributes
        run: |
          echo "===== BACKEND ENV (full OTel) ====="
          kubectl exec -n base deployment/backend -- env | grep -iE "otel|spring|management" | sort
