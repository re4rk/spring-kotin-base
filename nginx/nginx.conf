# Docker 내부 DNS — upstream 해석을 요청 시점으로 지연 (컨테이너 순서 무관)
resolver 127.0.0.11 valid=10s;

# HTTP — certbot webroot 챌린지 응답 후 나머지는 HTTPS로 리다이렉트
server {
    listen 80;
    server_name ark-base.site;

    # Let's Encrypt 도메인 소유 증명용 (갱신 시 certbot이 여기에 파일 생성)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Let's Encrypt SSL 종료 후 내부 프록시
server {
    listen 443 ssl;
    server_name ark-base.site;

    ssl_certificate     /etc/letsencrypt/live/ark-base.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ark-base.site/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # API → Spring Boot
    location /api/ {
        set $backend "backend:8080";
        proxy_pass http://$backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Actuator — 외부 노출 차단
    location /actuator {
        return 403;
    }

    # SPA → React
    location / {
        set $frontend "frontend:80";
        proxy_pass http://$frontend;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
