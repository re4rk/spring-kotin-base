# Faro collector — ark-base.site/faro/* → Alloy (monitoring namespace)
# Standard Ingress in monitoring namespace, directly references alloy service
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-faro-prefix
  namespace: monitoring
spec:
  stripPrefix:
    prefixes:
      - /faro
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: faro-ingress
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: monitoring-redirect-https@kubernetescrd,monitoring-strip-faro-prefix@kubernetescrd
    traefik.ingress.kubernetes.io/router.priority: "100"
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ark-base.site
      secretName: ark-base-site-tls
  rules:
    - host: ark-base.site
      http:
        paths:
          - path: /faro
            pathType: Prefix
            backend:
              service:
                name: alloy
                port:
                  number: 12347
