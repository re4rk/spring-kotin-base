apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: base
data:
  DB_URL: "jdbc:mysql://mysql:3306/base?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8"
  DB_USERNAME: "base"
  SPRING_DATA_REDIS_HOST: "redis"
  SPRING_DATA_REDIS_PORT: "6379"
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "files"
  MAIL_PORT: "587"
  MAIL_SMTP_AUTH: "true"
  MAIL_SMTP_STARTTLS: "true"
  TZ: "Asia/Seoul"
  OTEL_SERVICE_NAME: "base-backend"
  OTEL_EXPORTER_OTLP_TRACES_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
  MANAGEMENT_OTLP_TRACING_ENDPOINT: "http://tempo.monitoring.svc.cluster.local:4318/v1/traces"
  MANAGEMENT_TRACING_SAMPLING_PROBABILITY: "1.0"
