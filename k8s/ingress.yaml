# API Ingress — /api/* → backend (StripPrefix로 /api 제거 후 전달)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-ingress
  namespace: base
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: base-redirect-https@kubernetescrd,base-strip-api-prefix@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ark-base.site
      secretName: ark-base-site-tls
  rules:
    - host: ark-base.site
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
---
# Frontend Ingress — /* → frontend SPA
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: app-ingress
  namespace: base
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: base-redirect-https@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - ark-base.site
      secretName: ark-base-site-tls
  rules:
    - host: ark-base.site
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
---
# HTTP → HTTPS 리다이렉트
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: redirect-https
  namespace: base
spec:
  redirectScheme:
    scheme: https
    permanent: true
---
# /api 프리픽스 제거: /api/auth/register → /auth/register
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-api-prefix
  namespace: base
spec:
  stripPrefix:
    prefixes:
      - /api
